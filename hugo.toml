baseURL = 'https://jonathanmckay.com/'
languageCode = 'en-us'
title = 'Jonathan McKay'
theme = 'PaperMod'
paginate = 10
googleAnalytics = 'G-6CG9Z8EE9F'

[params.assets]
favicon = "favicon.svg"

[params]
env = "production"
description = "Journal and essays, 1999-present"
ShowReadingTime = true
DateFormat = "2006.01.02"
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = false
ShowCodeCopyButtons = true
ShowRssButtonInSectionTermList = false
defaultTheme = "auto"
disableThemeToggle = false
disableScrollToTop = true

[params.homeInfoParams]
Title = "Jonathan McKay"
Content = """
Journal and essays spanning 25 years. Topics include technology,
parenting, travel, language learning, and working at places like Facebook,
OpenAI, and the U.S. Foreign Service.
"""

[[menu.main]]
name = "Archive"
url = "/posts/"
weight = 10

[[menu.main]]
name = "Topics"
url = "/tags/"
weight = 20

[[menu.main]]
name = "Reviews"
url = "/reviews/"
weight = 25

[[menu.main]]
name = "About"
url = "/about/"
weight = 30

[taxonomies]
tag = "tags"
year = "years"
genre = "genres"

[params.analytics.google]
SiteVerificationTag = "XXXXXXXXXX"  # TODO: replace after verifying in Search Console

[permalinks]
posts = "/:year/:month/:slug/"
reviews = "/reviews/:slug/"
